<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 포장 온도조사 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --primary-color: #2b6cb0; --secondary-color: #4299e1; --bg-color: #edf2f7; --card-bg: #ffffff; --border-color: #cbd5e0; --text-color: #2d3748; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 10px; font-size: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        h2 { text-align: center; margin: 10px 0 15px 0; color: var(--primary-color); font-size: 1.4rem; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 14px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .meta-grid-three { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; font-weight: bold; margin-bottom: 4px; color: #4a5568; }
        .form-group input, .form-group select { padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; width: 100%; }
        .tab-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 12px; }
        .tab-btn { padding: 10px 2px; border: 1px solid var(--border-color); background: #fff; border-radius: 8px; font-weight: bold; font-size: 0.85rem; cursor: pointer; color: #718096; text-align: center; }
        .tab-btn.active { background-color: var(--primary-color); color: white; border-color: var(--primary-color); }
        .time-setter { background: #ebf8ff; border: 1px solid #bee3f8; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .time-setter input { width: 130px; padding: 6px; text-align: center; border: 1px solid #90cdf4; border-radius: 4px; }
        .zone-header { background: #4a5568; color: white; padding: 6px 12px; border-radius: 6px; font-weight: bold; margin-top: 15px; margin-bottom: 8px; }
        .location-row { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin-bottom: 8px; }
        .location-name { font-weight: bold; color: #1a202c; border-bottom: 1px dashed #cbd5e0; padding-bottom: 4px; margin-bottom: 8px; }
        .io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .part-box { display: flex; flex-direction: column; background: #fff; border: 1px solid #e2e8f0; padding: 6px; border-radius: 6px; }
        .part-title { font-size: 0.8rem; font-weight: bold; color: #718096; margin-bottom: 4px; }
        .part-inputs input { width: 100%; padding: 6px; border: 1px solid var(--border-color); border-radius: 4px; text-align: center; font-size: 15px; }
        .btn-group { display: flex; gap: 8px; margin-top: 15px; }
        button.main-btn { flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-save { background-color: var(--primary-color); color: white; }
        .btn-export { background-color: #2c7a7b; color: white; }
        .history-list { max-height: 220px; overflow-y: auto; font-size: 0.85rem; }
        .history-item { padding: 10px 6px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 6px; margin-bottom: 4px; border: 1px solid #edf2f7; }
        .history-clickable { flex: 1; cursor: pointer; display: flex; align-items: center; color: #2d3748; }
        .history-clickable:hover { color: var(--secondary-color); font-weight: bold; }
        .btn-del { background: #c53030; color: white; padding: 4px 8px; border: none; border-radius: 4px; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>실시간 포장 온도조사 시스템</h2>
    
    <div class="card">
        <div class="meta-grid">
            <div class="form-group">
                <label>조사 일자</label>
                <input type="date" id="surveyDate" onchange="onDateChange()">
            </div>
            <div class="form-group">
                <label>조사자</label>
                <input type="text" id="inspector" value="김성훈">
            </div>
        </div>
        
        <div class="meta-grid-three">
            <div class="form-group">
                <label>당일 날씨 (기상청 연동)</label>
                <select id="weather">
                    <option value="맑음">맑음</option>
                    <option value="흐림">흐림</option>
                    <option value="비">비</option>
                    <option value="눈">눈</option>
                </select>
            </div>
            <div class="form-group">
                <label>기상청 현재기온</label>
                <input type="text" id="outdoorTemp" readonly style="background-color: #f7fafc; color: #4a5568;" placeholder="연동 중...">
            </div>
            <div class="form-group" style="display: flex; flex-direction: column;">
                <label>기상청 최고 / 최저</label>
                <div style="display: flex; gap: 4px;">
                    <input type="text" id="maxTemp" readonly style="background-color: #fff5f5; color: #c53030; text-align: center; padding: 8px 2px;" placeholder="최고">
                    <input type="text" id="minTemp" readonly style="background-color: #ebf8ff; color: #2b6cb0; text-align: center; padding: 8px 2px;" placeholder="최저">
                </div>
            </div>
        </div>
        
        <div class="meta-grid-three">
            <div class="form-group">
                <label>A탱크 설정온도</label>
                <input type="text" id="tankTempA" placeholder="예: 173" onblur="formatTankTemp(this)">
            </div>
            <div class="form-group">
                <label>B탱크 설정온도</label>
                <input type="text" id="tankTempB" placeholder="예: 173" onblur="formatTankTemp(this)">
            </div>
            <div class="form-group">
                <label>C탱크 설정온도</label>
                <input type="text" id="tankTempC" placeholder="예: 173" onblur="formatTankTemp(this)">
            </div>
        </div>

        <div class="meta-grid">
            <div class="form-group" style="grid-column: span 2;">
                <label>특이사항</label>
                <input type="text" id="remarks" placeholder="특이사항을 입력해 주세요">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="tab-container">
            <button class="tab-btn active" data-turn="오전1회" onclick="switchTimeTab('오전1회')">오전 1회</button>
            <button class="tab-btn" data-turn="오전2회" onclick="switchTimeTab('오전2회')">오전 2회</button>
            <button class="tab-btn" data-turn="오후1회" onclick="switchTimeTab('오후1회')">오후 1회</button>
            <button class="tab-btn" data-turn="오후2회" onclick="switchTimeTab('오후2회')">오후 2회</button>
        </div>
        <div class="time-setter">
            <label id="currentTimeLabel">오전 1회 조사시간</label>
            <input type="text" id="surveyTimeInput" value="09:00" oninput="formatTimeInput(this)">
        </div>
    </div>

    <div class="card">
        <div id="dynamicForm"></div>
    </div>

    <div class="btn-group">
        <button class="main-btn btn-save" onclick="saveDataToCloud()">현재 회차 온라인 저장</button>
        <button class="main-btn btn-export" onclick="exportDataToCSV()">통합 엑셀(CSV) 다운로드</button>
    </div>

    <div class="card" style="margin-top: 12px;">
        <div style="font-weight: bold; font-size: 0.9rem; margin-bottom: 6px;">☁️ 클라우드 저장 내역 (클릭 시 즉시 조회)</div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
    const kmaApiKey = "143ff1a5d1cd692d8ede35b26f0c8110edc28cfee4a111f0960f692e5a9b405a";

    const firebaseConfig = {
        apiKey: "AIzaSyBc8r7qaA7ERBHWTea1PecJ4MYc8EKVDJY",
        authDomain: "temp-check-98786.firebaseapp.com",
        databaseURL: "https://temp-check-98786-default-rtdb.firebaseio.com",
        projectId: "temp-check-98786",
        storageBucket: "temp-check-98786.firebasestorage.app",
        messagingSenderId: "812408189502",
        appId: "1:812408189502:web:b9928b565575243994a96f"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const zoneStructure = {
        "A 구역": [{ id: "A1", label: "A1 지점" }, { id: "A3-1", label: "A3-1 (사무실방향)" }, { id: "A3-2", label: "A3-2 (포장방향)" }, { id: "A4", label: "A4 지점" }, { id: "A6", label: "A6 지점" }],
        "B 구역": [{ id: "B1", label: "B1 지점" }, { id: "B3", label: "B3 지점" }, { id: "B4", label: "B4 지점" }],
        "C 구역": [{ id: "C4", label: "C4 지점" }, { id: "C6", label: "C6 지점" }, { id: "C7", label: "C7 지점" }]
    };

    let currentTab = "오전1회";
    let tempMemory = { "오전1회": {}, "오전2회": {}, "오후1회": {}, "오후2회": {} };
    let timeMemory = { "오전1회": "09:00", "오전2회": "11:00", "오후1회": "14:00", "오후2회": "16:00" };
    let globalCloudDB = [];
    let isInitialLoad = true;
    let mySavingProcess = false;

    document.getElementById('surveyDate').value = new Date().toISOString().substring(0, 10);

    function buildForm() {
        const formContainer = document.getElementById('dynamicForm');
        formContainer.innerHTML = '';
        for (const [zoneName, locations] of Object.entries(zoneStructure)) {
            const zoneHeader = document.createElement('div');
            zoneHeader.className = 'zone-header';
            zoneHeader.innerText = `■ ${zoneName}`;
            formContainer.appendChild(zoneHeader);

            locations.forEach(loc => {
                const row = document.createElement('div');
                row.className = 'location-row';
                row.innerHTML = `
                    <div class="location-name">${loc.label}</div>
                    <div class="io-grid">
                        <div class="part-box">
                            <span class="part-title">입수구 (A/D)</span>
                            <div class="part-inputs">
                                <input type="text" placeholder="A ℃" class="temp-field" data-loc="${loc.id}" data-part="입수구_A" onfocus="onTempFocus(this)" onblur="onTempBlur(this)">
                                <input type="text" placeholder="D ℃" class="temp-field" data-loc="${loc.id}" data-part="입수구_D" onfocus="onTempFocus(this)" onblur="onTempBlur(this)">
                            </div>
                        </div>
                        <div class="part-box">
                            <span class="part-title">출수구 (A/D)</span>
                            <div class="part-inputs">
                                <input type="text" placeholder="A ℃" class="temp-field" data-loc="${loc.id}" data-part="출수구_A" onfocus="onTempFocus(this)" onblur="onTempBlur(this)">
                                <input type="text" placeholder="D ℃" class="temp-field" data-loc="${loc.id}" data-part="출수구_D" onfocus="onTempFocus(this)" onblur="onTempBlur(this)">
                            </div>
                        </div>
                    </div>
                `;
                formContainer.appendChild(row);
            });
        }
    }

    function fetchKmaWeather() {
        if (!kmaApiKey) return;
        const dateVal = document.getElementById('surveyDate').value;
        if (!dateVal) return;
        
        const todayStr = new Date().toISOString().substring(0, 10);
        if (dateVal !== todayStr) return; 

        const baseDate = dateVal.replace(/-/g, '');
        const url = `https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getVilageFcst?serviceKey=${encodeURIComponent(kmaApiKey)}&pageNo=1&numOfRows=1000&dataType=JSON&base_date=${baseDate}&base_time=0500&nx=73&ny=135`;

        fetch(url)
            .then(res => res.json())
            .then(resData => {
                const items = resData?.response?.body?.items?.item;
                if (!items) return;

                let currentHour = new Date().getHours();
                let currentHourStr = currentHour < 10 ? `0${currentHour}00` : `${currentHour}00`;

                let tmpValue = ""; let tmxValue = ""; let tmnValue = ""; let skyValue = ""; let ptyValue = "";

                items.forEach(item => {
                    if (item.category === "TMP" && item.fcstTime === currentHourStr) tmpValue = item.fcstValue;
                    if (item.category === "TMX") tmxValue = parseFloat(item.fcstValue).toFixed(0);
                    if (item.category === "TMN") tmnValue = parseFloat(item.fcstValue).toFixed(0);
                    if (item.fcstTime === currentHourStr) {
                        if (item.category === "SKY") skyValue = item.fcstValue;
                        if (item.category === "PTY") ptyValue = item.fcstValue;
                    }
                });

                if (tmpValue) document.getElementById('outdoorTemp').value = `${tmpValue} ℃`;
                if (tmxValue) document.getElementById('maxTemp').value = `${tmxValue}℃`;
                if (tmnValue) document.getElementById('minTemp').value = `${tmnValue}℃`;

                let weatherResult = "맑음";
                if (ptyValue === "1" || ptyValue === "4") weatherResult = "비";
                else if (ptyValue === "2" || ptyValue === "3") weatherResult = "눈";
                else if (skyValue === "3" || skyValue === "4") weatherResult = "흐림";
                
                document.getElementById('weather').value = weatherResult;
            })
            .catch(err => console.log("기상청 API 연동 실패:", err));
    }

    function onDateChange() {
        document.getElementById('outdoorTemp').value = "";
        document.getElementById('maxTemp').value = "";
        document.getElementById('minTemp').value = "";
        document.getElementById('remarks').value = "";
        loadRealtimeData();
        fetchKmaWeather();
    }

    function formatTimeInput(input) {
        let val = input.value.replace(/[^0-9]/g, '');
        if (val.length === 4) {
            input.value = `${val.substring(0, 2)}:${val.substring(2, 4)}`;
            timeMemory[currentTab] = input.value;
        } else { timeMemory[currentTab] = val; }
    }

    function autoDecimalConvert(val) {
        let clean = val.replace(/[^0-9.]/g, '');
        if (clean === "" || isNaN(clean)) return "";
        if (clean.includes('.')) return clean;
        if (clean.length >= 2) {
            let num = parseFloat(clean) / 10;
            return num.toFixed(1);
        }
        return clean;
    }

    function formatTankTemp(input) {
        let converted = autoDecimalConvert(input.value.trim());
        if (converted !== "") input.value = `${converted} ℃`;
        else input.value = "";
    }

    function onTempFocus(input) {
        const key = `${input.dataset.loc}_${input.dataset.part}`;
        input.value = tempMemory[currentTab][key] || "";
    }

    function onTempMemoryValue(input, targetTab = currentTab) {
        const key = `${input.dataset.loc}_${input.dataset.part}`;
        let converted = autoDecimalConvert(input.value.trim());
        if (converted !== "") {
            tempMemory[targetTab][key] = converted;
            input.value = `${converted} ℃`;
        } else {
            tempMemory[targetTab][key] = "";
            input.value = "";
        }
    }
    
    function onTempBlur(input) {
        onTempMemoryValue(input);
    }

    function switchTimeTab(targetTab) {
        currentTab = targetTab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-turn') === targetTab);
        });
        document.getElementById('currentTimeLabel').innerText = `${targetTab} 조사시간`;
        document.getElementById('surveyTimeInput').value = timeMemory[targetTab] || "";
        
        document.querySelectorAll('.temp-field').forEach(f => {
            const key = `${f.dataset.loc}_${f.dataset.part}`;
            const numVal = tempMemory[targetTab][key];
            f.value = numVal ? `${numVal} ℃` : "";
        });
    }

    function loadRealtimeData() {
        const date = document.getElementById('surveyDate').value;
        if (!date) return;

        database.ref('records/' + date).once('value', (snapshot) => {
            tempMemory = { "오전1회": {}, "오전2회": {}, "오후1회": {}, "오후2회": {} };
            const data = snapshot.val();
            if (data) {
                if(data.meta) {
                    document.getElementById('inspector').value = data.meta.inspector || "김성훈";
                    document.getElementById('weather').value = data.meta.weather || "맑음";
                    document.getElementById('outdoorTemp').value = data.meta.outdoorTemp || "";
                    document.getElementById('maxTemp').value = data.meta.maxTemp || "";
                    document.getElementById('minTemp').value = data.meta.minTemp || "";
                    document.getElementById('tankTempA').value = data.meta.tankTempA || "";
                    document.getElementById('tankTempB').value = data.meta.tankTempB || "";
                    document.getElementById('tankTempC').value = data.meta.tankTempC || "";
                    document.getElementById('remarks').value = data.meta.remarks || "";
                }
                for (const [turn, turnData] of Object.entries(data)) {
                    if (turn === 'meta') continue;
                    if (turnData.time) timeMemory[turn] = turnData.time;
                    if (turnData.values) tempMemory[turn] = turnData.values;
                }
            } else {
                document.getElementById('tankTempA').value = "";
                document.getElementById('tankTempB').value = "";
                document.getElementById('tankTempC').value = "";
                document.getElementById('remarks').value = "";
            }
            switchTimeTab(currentTab);
        });
    }

    function viewHistoryDetails(selectedDate, selectedTurn) {
        document.getElementById('surveyDate').value = selectedDate;
        database.ref('records/' + selectedDate).once('value', (snapshot) => {
            tempMemory = { "오전1회": {}, "오전2회": {}, "오후1회": {}, "오후2회": {} };
            const data = snapshot.val();
            if (data) {
                if(data.meta) {
                    document.getElementById('inspector').value = data.meta.inspector || "김성훈";
                    document.getElementById('weather').value = data.meta.weather || "맑음";
                    document.getElementById('outdoorTemp').value = data.meta.outdoorTemp || "";
                    document.getElementById('maxTemp').value = data.meta.maxTemp || "";
                    document.getElementById('minTemp').value = data.meta.minTemp || "";
                    document.getElementById('tankTempA').value = data.meta.tankTempA || "";
                    document.getElementById('tankTempB').value = data.meta.tankTempB || "";
                    document.getElementById('tankTempC').value = data.meta.tankTempC || "";
                    document.getElementById('remarks').value = data.meta.remarks || "";
                }
                for (const [turn, turnData] of Object.entries(data)) {
                    if (turn === 'meta') continue;
                    if (turnData.time) timeMemory[turn] = turnData.time;
                    if (turnData.values) tempMemory[turn] = turnData.values;
                }
            }
            switchTimeTab(selectedTurn);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    function saveDataToCloud() {
        const date = document.getElementById('surveyDate').value;
        const inspector = document.getElementById('inspector').value;
        const weather = document.getElementById('weather').value;
        const outdoorTemp = document.getElementById('outdoorTemp').value;
        const maxTemp = document.getElementById('maxTemp').value;
        const minTemp = document.getElementById('minTemp').value;
        const tankTempA = document.getElementById('tankTempA').value;
        const tankTempB = document.getElementById('tankTempB').value;
        const tankTempC = document.getElementById('tankTempC').value;
        const remarks = document.getElementById('remarks').value;
        const inputTime = document.getElementById('surveyTimeInput').value;

        if(!date) { alert('날짜를 지정해 주세요.'); return; }
        
        document.querySelectorAll('.temp-field').forEach(input => {
            if(document.activeElement === input) onTempMemoryValue(input);
        });

        const metaData = { inspector, weather, outdoorTemp, maxTemp, minTemp, tankTempA, tankTempB, tankTempC, remarks };
        const currentData = tempMemory[currentTab];

        mySavingProcess = true;
        database.ref('records/' + date + '/meta').set(metaData);
        database.ref('records/' + date + '/' + currentTab).set({
            time: inputTime,
            values: currentData
        }).then(() => {
            alert(`☁️ [${currentTab}] 데이터가 정상적으로 저장되었습니다!`);
            setTimeout(() => { mySavingProcess = false; }, 1500);
        }).catch((error) => {
            alert("저장 실패: " + error.message);
            mySavingProcess = false;
        });
    }

    function trackAllHistory() {
        database.ref('records').on('value', (snapshot) => {
            const allData = snapshot.val();
            const histDiv = document.getElementById('historyList');
            histDiv.innerHTML = '';
            let newCloudDB = [];

            if (!allData) {
                histDiv.innerHTML = '<div style="color:#a0aec0; text-align:center; padding:15px;">저장 내역이 비어있습니다.</div>';
                isInitialLoad = false; return;
            }

            Object.keys(allData).sort().reverse().forEach(date => {
                const dateData = allData[date];
                const meta = dateData.meta || {};
                
                for (const [turn, turnData] of Object.entries(dateData)) {
                    if (turn === 'meta') continue;
                    const count = turnData.values ? Object.keys(turnData.values).filter(k => turnData.values[k]).length : 0;
                    if (count === 0) continue;

                    const item = document.createElement('div');
                    item.className = 'history-item';
                    item.innerHTML = `
                        <div class="history-clickable" onclick="viewHistoryDetails('${date}', '${turn}')">
                            <span>🔍 <b>${date}</b> - ${turn} (${count}건)</span>
                        </div>
                        <button class="btn-del" onclick="deleteCloudGroup('${date}', '${turn}')">삭제</button>
                    `;
                    histDiv.appendChild(item);

                    if(turn
